server {
    listen 80;
    server_name gallery.example.com;

    client_max_body_size 100M;

    set $agms_client_ip $remote_addr;
    if ($http_true_client_ip != "") {
        set $agms_client_ip $http_true_client_ip;
    }
    if ($http_ali_cdn_real_ip != "") {
        set $agms_client_ip $http_ali_cdn_real_ip;
    }
    if ($http_ali_real_client_ip != "") {
        set $agms_client_ip $http_ali_real_client_ip;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $agms_client_ip;
        proxy_set_header X-Forwarded-For $agms_client_ip;
        proxy_set_header Ali-Real-Client-IP $http_ali_real_client_ip;
        proxy_set_header Ali-Cdn-Real-Ip $http_ali_cdn_real_ip;
        proxy_set_header True-Client-IP $http_true_client_ip;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /storage/ {
        alias /opt/anime-gallery/storage/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public";
    }

    location / {
        root /opt/anime-gallery/frontend/dist;
        try_files $uri $uri/ /index.html;
    }
}
